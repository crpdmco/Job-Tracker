name: Build IPA

on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'

      - run: flutter pub get

      - run: flutter build ios --release --no-codesign

      - run: mkdir -p Payload && cp -r build/ios/iphoneos/Runner.app Payload/

      - run: zip -r JobTrackr.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: JobTrackr-ipa
          path: JobTrackr.ipa
